name: mindhaven
description: A mental wellness Flutter app built with love.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_local_notifications: ^16.3.1  
  timezone: ^0.9.2
  intl: ^0.18.1

  permission_handler: ^11.3.1

  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  provider: ^6.1.2

  table_calendar: ^3.0.9
  audioplayers: ^5.2.1
  image_picker: ^1.0.4
  firebase_core: ^3.4.0
  cloud_firestore: ^5.0.1
  firebase_auth: ^5.2.0
  google_sign_in: ^6.1.6
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/data/
